name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  reconciliation-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r data_generator/requirements.txt
          pip install pytest

      - name: Generate fresh synthetic GL data
        run: python data_generator/generate_gl_data.py

      - name: Run reconciliation engine end-to-end
        run: python engine/run_reconciliation.py

      - name: Run reconciliation tests
        run: pytest tests/ -v
